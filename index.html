        <script type="text/javascript">
            function WarpTo(url) {
                if (url == '') {
                    alert('本系統尚未開放使用！');
                } else {
                    window.open(url, '_blank')
                }
                return false;
            }

            function checkPassword() {
                var pwd = document.getElementById('pwdInput').value;
                if (pwd === 'QWARE') {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            }
            function checkSession() {
                if (sessionStorage.getItem('isLoggedIn') === 'true') {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                }
                // Add focus to password input on load
                var input = document.getElementById('pwdInput');
                if (input && document.getElementById('loginScreen').style.display !== 'none') {
                    input.focus();
                }
            }

            function togglePwdVisibility() {
                var input = document.getElementById('pwdInput');
                var icon = document.getElementById('togglePassword');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.style.opacity = '1';  // 提高透明度表示顯示狀態
                } else {
                    input.type = 'password';
                    icon.style.opacity = '0.5'; // 降低透明度表示隱藏狀態
                }
            }
